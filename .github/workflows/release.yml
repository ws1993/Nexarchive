name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Validate updater signing secrets
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw "Missing secret: TAURI_SIGNING_PRIVATE_KEY"
          }
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD)) {
            throw "Missing secret: TAURI_SIGNING_PRIVATE_KEY_PASSWORD"
          }
          Set-Content -Path .ci-signing-smoke.txt -Value "signing-smoke-test" -NoNewline -Encoding UTF8
          npm run tauri signer sign -- .ci-signing-smoke.txt
          if ($LASTEXITCODE -ne 0) {
            throw "Signing self-check failed. Check TAURI_SIGNING_PRIVATE_KEY and TAURI_SIGNING_PRIVATE_KEY_PASSWORD."
          }
          Remove-Item .ci-signing-smoke.txt, .ci-signing-smoke.txt.sig -Force -ErrorAction SilentlyContinue

      - name: Verify synchronized versions
        shell: bash
        run: npm run release:verify -- "${GITHUB_REF_NAME#v}"

      - name: Extract changelog for this tag
        id: changelog
        shell: bash
        run: |
          notes="$(npm run -s release:extract-notes -- "${GITHUB_REF_NAME}")"
          {
            echo "body<<EOF"
            echo "${notes}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and publish GitHub Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "NexArchive ${{ github.ref_name }}"
          releaseBody: ${{ steps.changelog.outputs.body }}
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
          args: --verbose
